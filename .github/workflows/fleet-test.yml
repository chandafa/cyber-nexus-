name: Fleet Tests

# Jalankan SELURUH suite python/tests/ pada setiap push/PR yang menyentuh kode
# python (fleet, modules, core, parsers) atau test/CI itu sendiri.
on:
  push:
    paths:
      - "python/**"
      - ".github/workflows/fleet-test.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/fleet-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Tiap test_*.py adalah skrip standalone yang menyetel sys.path + env (DB
      # terisolasi) saat import. Mengoleksinya dalam SATU proses pytest akan saling
      # mencemari env/DB, jadi tiap file dijalankan sebagai PROSES TERPISAH dan
      # dianggap gagal bila keluar non-zero (semua memakai exit code main()).
      - name: Run full python test suite (each file isolated)
        env:
          # Import modul fleet butuh python/fleet di path; test desktop/parsers
          # menyetel path sendiri. Demo dipaksa aktif agar tak butuh biner eksternal.
          PYTHONPATH: python:python/fleet
          NEXUS_FORCE_DEMO: "1"
        run: |
          set -u
          cd python
          fail=0
          # test_waf.py mengikat reverse-proxy lokal (port) & bisa flaky di CI —
          # ditangani terpisah di bawah agar tak menggagalkan pipeline secara semu.
          for t in tests/test_*.py; do
            if [ "$t" = "tests/test_waf.py" ]; then
              continue
            fi
            echo "::group::$t"
            if python "$t"; then
              echo "PASS: $t"
            else
              echo "::error::FAILED: $t"
              fail=1
            fi
            echo "::endgroup::"
          done

          # test_waf.py: jalankan tapi JANGAN gagalkan pipeline bila tak bisa bind
          # socket lokal / lingkungan jaringan terbatas (flaky CI). Hasil dilaporkan
          # sebagai warning, bukan error.
          echo "::group::tests/test_waf.py (toleran terhadap kegagalan bind)"
          if python tests/test_waf.py; then
            echo "PASS: tests/test_waf.py"
          else
            echo "::warning::tests/test_waf.py gagal/diskip (kemungkinan tak bisa bind socket di CI) — tidak menggagalkan pipeline."
          fi
          echo "::endgroup::"

          if [ "$fail" -ne 0 ]; then
            echo "Satu atau lebih test inti gagal."
            exit 1
          fi
          echo "Semua test inti lulus."
