name: Fleet Publish

# Publikasi komponen Nexus Fleet (python/fleet) ke PyPI + npm.
#
# Pemicu: push tag `fleet-v*` (mis. fleet-v1.0.0) atau manual.
# Secrets yang diperlukan (Settings → Secrets → Actions):
#   - PYPI_API_TOKEN  (token PyPI, format pypi-...)
#   - NPM_TOKEN       (token npm, "Automation" token)
on:
  push:
    tags:
      - "fleet-v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: python/fleet

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check artifacts
        run: twine check dist/*
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
